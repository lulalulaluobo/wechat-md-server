<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wechat MD Server Settings</title>
  <style>
    :root {
      --bg: #f4efe6;
      --card: #fffdf8;
      --ink: #1f2430;
      --muted: #6a7280;
      --line: #ded4c2;
      --accent: #c35f2d;
      --accent-2: #285943;
      --warn: #9d3d2d;
      --changed: #fff1ce;
      --danger-soft: #fff0ec;
      --success-soft: #edf8f2;
      --info-soft: #eff5ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(195,95,45,.14), transparent 28%),
        radial-gradient(circle at bottom left, rgba(40,89,67,.1), transparent 26%),
        var(--bg);
    }
    main { max-width: 1080px; margin: 0 auto; padding: 40px 20px 56px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .nav { display: flex; gap: 10px; }
    .nav a, .toolbar button, .action-row button {
      text-decoration: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
      font: inherit;
    }
    .toolbar button, .action-row button.secondary { background: var(--accent-2); }
    .action-row button.warn { background: var(--warn); }
    h1 { margin: 0 0 8px; font-size: 34px; }
    p.lead { margin: 0 0 24px; color: var(--muted); }
    .card {
      background: rgba(255,253,248,.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(46, 38, 26, .08);
      margin-top: 16px;
    }
    .overview-grid, .grid, .status-grid {
      display: grid;
      gap: 16px;
    }
    .overview-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin: 20px 0 16px; }
    .grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .status-grid { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .metric {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,253,248,.98), rgba(248,241,229,.88));
      box-shadow: 0 16px 38px rgba(54, 45, 32, .08);
    }
    .metric strong { display: block; font-size: 24px; margin-top: 6px; word-break: break-word; }
    .muted { color: var(--muted); }
    label { display: block; margin: 12px 0 6px; font-size: 14px; color: var(--muted); }
    input, textarea, select {
      width: 100%;
      font: inherit;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: #fff;
    }
    textarea { min-height: 160px; resize: vertical; }
    .field-hint { margin-top: 6px; min-height: 18px; font-size: 12px; color: var(--muted); }
    .field-hint.error { color: var(--warn); }
    .field-hint.success { color: #1e6a48; }
    .input-invalid { border-color: var(--warn); background: var(--danger-soft); }
    .changed { background: var(--changed); }
    .action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 6px 10px;
      font-size: 12px; font-weight: 600;
    }
    .pill.success { background: var(--success-soft); color: #1e6a48; }
    .pill.warn { background: #fff4e4; color: #9a5a15; }
    .pill.error { background: var(--danger-soft); color: #9d3d2d; }
    .pill.info { background: var(--info-soft); color: #2e5fa8; }
    pre {
      margin: 0; padding: 14px; border-radius: 14px; background: #231f1a; color: #f2eee7;
      overflow: auto; white-space: pre-wrap; word-break: break-word; min-height: 140px;
    }
    .mode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-top: 12px; }
    .mode-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }
    .mode-card input { width: auto; margin-right: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main>
    <div class="toolbar">
      <div class="nav">
        <a href="/">转换</a>
        <a href="/settings">设置</a>
      </div>
      <button id="logout-button">退出登录</button>
    </div>
    <h1>后台设置</h1>
    <p class="lead">在这里维护 Fast Note Sync、图片外链策略和账号安全。剪贴板导入只负责填表，不会自动保存到服务端。</p>

    <section class="overview-grid">
      <article class="metric">
        <span class="muted">顶部概览</span>
        <strong id="metric-auth">-</strong>
        <span class="muted">认证状态</span>
      </article>
      <article class="metric">
        <span class="muted">当前登录用户</span>
        <strong id="metric-user">-</strong>
        <span class="muted">单用户模式</span>
      </article>
      <article class="metric">
        <span class="muted">FNS Vault</span>
        <strong id="metric-vault">-</strong>
        <span class="muted">同步目标</span>
      </article>
      <article class="metric">
        <span class="muted">图片模式</span>
        <strong id="metric-image-mode">-</strong>
        <span class="muted">原链或 S3 外链</span>
      </article>
    </section>

    <section class="card">
      <h2>FNS 导入</h2>
      <label for="fns-json-input">粘贴 FNS JSON</label>
      <textarea id="fns-json-input" placeholder='{"api":"https://...","apiToken":"...","vault":"obsidian"}'></textarea>
      <div class="action-row">
        <button id="paste-fns-button">从剪贴板导入 FNS</button>
        <button id="parse-fns-button" class="secondary">解析并填充</button>
      </div>
    </section>

    <div class="status-grid">
      <section class="card">
        <h2>FNS 连接状态</h2>
        <div class="pill info" id="fns-health-pill">待检测</div>
        <p class="muted" id="fns-health-message">尚未检测 FNS 连接。</p>
        <div class="action-row">
          <button id="check-fns-button" class="secondary">检测 FNS 连接</button>
        </div>
        <pre id="fns-status-result">等待检测</pre>
      </section>
      <section class="card">
        <h2>操作结果</h2>
        <pre id="settings-result">等待操作</pre>
      </section>
    </div>

    <section class="card">
      <h2>服务配置</h2>
      <div class="grid">
        <div>
          <label for="fns-base-url">FNS 基础地址</label>
          <input id="fns-base-url" placeholder="https://obsync.example.com" />
          <div class="field-hint" id="hint-fns-base-url"></div>
        </div>
        <div>
          <label for="fns-vault">Vault</label>
          <input id="fns-vault" placeholder="obsidian" />
          <div class="field-hint" id="hint-fns-vault"></div>
        </div>
        <div>
          <label for="fns-target-dir">目标目录</label>
          <input id="fns-target-dir" placeholder="00_Inbox/微信公众号" />
          <div class="field-hint" id="hint-fns-target-dir"></div>
        </div>
        <div>
          <label for="fns-token">FNS Token</label>
          <input id="fns-token" type="password" placeholder="留空则保持不变" />
          <div class="muted" id="fns-token-meta"></div>
          <div class="field-hint" id="hint-fns-token"></div>
        </div>
        <div>
          <label for="cleanup-temp-on-success">转换成功后清理临时目录</label>
          <input id="cleanup-temp-on-success" type="checkbox" style="width:auto; padding:0; transform: translateY(4px);" />
          <div class="field-hint success" id="hint-cleanup-temp-on-success">失败任务仍会默认清理临时目录。</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>图片外链设置</h2>
      <div class="mode-grid">
        <label class="mode-card">
          <input type="radio" name="image-mode" id="image-mode-wechat" value="wechat_hotlink" />
          <strong>微信原链</strong>
          <div class="muted">不上传图片，Markdown 直接保留微信图片外链。</div>
        </label>
        <label class="mode-card">
          <input type="radio" name="image-mode" id="image-mode-s3" value="s3_hotlink" />
          <strong>S3 图床外链</strong>
          <div class="muted">静态图压缩后上传到通用 S3 图床，GIF / SVG 保留微信原链。</div>
        </label>
      </div>

      <div id="s3-settings-panel" class="hidden">
        <div class="grid">
          <div>
            <label for="image-storage-endpoint">S3 Endpoint</label>
            <input id="image-storage-endpoint" placeholder="https://s3.example.com" />
            <div class="field-hint" id="hint-image-storage-endpoint"></div>
          </div>
          <div>
            <label for="image-storage-region">Region</label>
            <input id="image-storage-region" placeholder="auto" />
            <div class="field-hint" id="hint-image-storage-region"></div>
          </div>
          <div>
            <label for="image-storage-bucket">Bucket</label>
            <input id="image-storage-bucket" placeholder="wechat-images" />
            <div class="field-hint" id="hint-image-storage-bucket"></div>
          </div>
          <div>
            <label for="image-storage-access-key-id">Access Key ID</label>
            <input id="image-storage-access-key-id" placeholder="AKIA..." />
            <div class="field-hint" id="hint-image-storage-access-key-id"></div>
          </div>
          <div>
            <label for="image-storage-secret-access-key">Secret Access Key</label>
            <input id="image-storage-secret-access-key" type="password" placeholder="留空则保持不变" />
            <div class="muted" id="image-storage-secret-meta"></div>
            <div class="field-hint" id="hint-image-storage-secret-access-key"></div>
          </div>
          <div>
            <label for="image-storage-path-template">路径模板</label>
            <input id="image-storage-path-template" placeholder="wechat/{year}/{filename}" />
            <div class="field-hint" id="hint-image-storage-path-template"></div>
          </div>
          <div>
            <label for="image-storage-public-base-url">公开访问域名</label>
            <input id="image-storage-public-base-url" placeholder="https://img.example.com" />
            <div class="field-hint" id="hint-image-storage-public-base-url"></div>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button id="clear-fns-token" class="warn">清空 FNS Token</button>
        <button id="clear-image-storage-secret" class="warn">清空图床密钥</button>
        <button id="save-settings" class="secondary">保存并生效</button>
      </div>
    </section>

    <section class="card">
      <h2>账号安全</h2>
      <p class="muted">当前登录用户：<strong id="current-user-label">-</strong></p>
      <div class="grid">
        <div>
          <label for="current-password">修改密码：当前密码</label>
          <input id="current-password" type="password" autocomplete="current-password" />
        </div>
        <div>
          <label for="new-password">修改密码：新密码</label>
          <input id="new-password" type="password" autocomplete="new-password" />
        </div>
      </div>
      <div class="action-row">
        <button id="change-password-button" class="secondary">修改密码</button>
      </div>
    </section>
  </main>
  <script>
    const resultEl = document.getElementById("settings-result");
    const fnsStatusEl = document.getElementById("fns-status-result");
    const clearFields = new Set();
    const s3FieldIds = [
      "image-storage-endpoint",
      "image-storage-region",
      "image-storage-bucket",
      "image-storage-access-key-id",
      "image-storage-secret-access-key",
      "image-storage-path-template",
      "image-storage-public-base-url"
    ];

    function getImageMode() {
      return document.querySelector('input[name="image-mode"]:checked')?.value || "wechat_hotlink";
    }

    const validators = {
      "fns-base-url": (value) => !value || /^https?:\/\//i.test(value)
        ? { ok: true, text: value ? "地址格式正确。" : "可留空，表示暂不配置 FNS。" }
        : { ok: false, text: "必须以 http:// 或 https:// 开头。" },
      "fns-vault": (value) => !document.getElementById("fns-base-url").value.trim() || value
        ? { ok: true, text: value ? "Vault 已填写。" : "未启用 FNS 时可以留空。" }
        : { ok: false, text: "启用 FNS 时请输入 vault 名称。" },
      "fns-target-dir": (value) => value ? { ok: true, text: "将同步到该目录。" } : { ok: false, text: "请输入目标目录。" },
      "fns-token": (value) => !document.getElementById("fns-base-url").value.trim() || value || document.getElementById("fns-token-meta").textContent.includes("已配置")
        ? { ok: true, text: "FNS Token 可用。" }
        : { ok: false, text: "启用 FNS 时需要填写 Token。" },
      "image-storage-endpoint": (value) => getImageMode() !== "s3_hotlink" || /^https?:\/\//i.test(value)
        ? { ok: true, text: getImageMode() === "s3_hotlink" ? "Endpoint 格式正确。" : "当前模式无需填写。" }
        : { ok: false, text: "S3 Endpoint 必须以 http:// 或 https:// 开头。" },
      "image-storage-region": (value) => getImageMode() !== "s3_hotlink" || value
        ? { ok: true, text: getImageMode() === "s3_hotlink" ? "Region 已填写。" : "当前模式无需填写。" }
        : { ok: false, text: "请选择或填写 S3 Region。" },
      "image-storage-bucket": (value) => getImageMode() !== "s3_hotlink" || value
        ? { ok: true, text: getImageMode() === "s3_hotlink" ? "Bucket 已填写。" : "当前模式无需填写。" }
        : { ok: false, text: "请输入 Bucket。" },
      "image-storage-access-key-id": (value) => getImageMode() !== "s3_hotlink" || value
        ? { ok: true, text: getImageMode() === "s3_hotlink" ? "Access Key ID 已填写。" : "当前模式无需填写。" }
        : { ok: false, text: "请输入 Access Key ID。" },
      "image-storage-secret-access-key": (value) => getImageMode() !== "s3_hotlink" || value || document.getElementById("image-storage-secret-meta").textContent.includes("已配置")
        ? { ok: true, text: getImageMode() === "s3_hotlink" ? "图床密钥可用。" : "当前模式无需填写。" }
        : { ok: false, text: "请输入 Secret Access Key。" },
      "image-storage-path-template": (value) => getImageMode() !== "s3_hotlink" || value
        ? { ok: true, text: getImageMode() === "s3_hotlink" ? "路径模板已填写。" : "当前模式无需填写。" }
        : { ok: false, text: "请输入路径模板。" },
      "image-storage-public-base-url": (value) => getImageMode() !== "s3_hotlink" || /^https?:\/\//i.test(value)
        ? { ok: true, text: getImageMode() === "s3_hotlink" ? "公开访问域名格式正确。" : "当前模式无需填写。" }
        : { ok: false, text: "公开访问域名必须以 http:// 或 https:// 开头。" }
    };

    function markChanged(id) {
      document.getElementById(id)?.classList.add("changed");
    }

    function resetChanged() {
      document.querySelectorAll(".changed").forEach((node) => node.classList.remove("changed"));
    }

    function setResult(message, data) {
      const lines = [message];
      if (data) {
        lines.push(JSON.stringify(data, null, 2));
      }
      resultEl.textContent = lines.join("\n\n");
    }

    function setFnsHealth(state, message) {
      const pill = document.getElementById("fns-health-pill");
      pill.className = `pill ${state}`;
      pill.textContent = state === "success" ? "连接正常" : state === "warn" ? "部分可用" : state === "error" ? "连接异常" : "待检测";
      document.getElementById("fns-health-message").textContent = message;
    }

    function updateOverview(data) {
      document.getElementById("metric-auth").textContent = data.auth_enabled ? "已开启" : "未开启";
      document.getElementById("metric-user").textContent = data.current_user?.username || "-";
      document.getElementById("metric-vault").textContent = data.fns_vault || "未配置";
      document.getElementById("metric-image-mode").textContent = data.image_mode === "s3_hotlink" ? "S3 图床外链" : "微信原链";
      document.getElementById("current-user-label").textContent = data.current_user?.username || "-";
    }

    function setHint(id, state, text) {
      const input = document.getElementById(id);
      const hint = document.getElementById(`hint-${id}`);
      if (!input || !hint) return;
      hint.textContent = text;
      hint.className = `field-hint ${state ? "success" : "error"}`;
      input.classList.toggle("input-invalid", !state);
    }

    function syncImageModeUI() {
      const useS3 = getImageMode() === "s3_hotlink";
      document.getElementById("s3-settings-panel").classList.toggle("hidden", !useS3);
      validateForm();
    }

    function validateField(id) {
      const value = document.getElementById(id)?.value?.trim() || "";
      const result = validators[id](value);
      setHint(id, result.ok, result.text);
      return result.ok;
    }

    function validateForm() {
      const ids = ["fns-base-url", "fns-vault", "fns-target-dir", "fns-token", ...s3FieldIds];
      const allValid = ids.every((id) => validateField(id));
      document.getElementById("save-settings").disabled = !allValid;
      return allValid;
    }

    function parseFnsJson(rawText) {
      let parsed;
      try {
        parsed = JSON.parse(rawText);
      } catch (error) {
        throw new Error("FNS 配置不是有效 JSON");
      }
      const missing = ["api", "apiToken", "vault"].filter((key) => !String(parsed[key] || "").trim());
      if (missing.length) {
        throw new Error(`FNS 配置缺少字段: ${missing.join(", ")}`);
      }
      const api = String(parsed.api).trim();
      if (!/^https?:\/\//i.test(api)) {
        throw new Error("FNS 基础地址格式无效，必须以 http:// 或 https:// 开头");
      }
      return {
        fns_base_url: api.replace(/\/+$/, ""),
        fns_token: String(parsed.apiToken).trim(),
        fns_vault: String(parsed.vault).trim()
      };
    }

    function applyFnsImport(parsed) {
      document.getElementById("fns-base-url").value = parsed.fns_base_url;
      document.getElementById("fns-vault").value = parsed.fns_vault;
      document.getElementById("fns-token").value = parsed.fns_token;
      ["fns-base-url", "fns-vault", "fns-token"].forEach(markChanged);
      clearFields.delete("fns_token");
      document.getElementById("fns-token-meta").textContent = "本次已导入新的 FNS Token，保存后才会写入服务端。";
      validateForm();
      setResult("已识别 FNS 配置并填充表单。", {
        fns_base_url: parsed.fns_base_url,
        fns_vault: parsed.fns_vault,
        fns_token: "已填入"
      });
    }

    async function loadSettings() {
      const response = await fetch("/api/admin/settings");
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || JSON.stringify(data));
      }
      document.getElementById("fns-base-url").value = data.fns_base_url || "";
      document.getElementById("fns-vault").value = data.fns_vault || "";
      document.getElementById("fns-target-dir").value = data.fns_target_dir || "";
      document.getElementById("fns-token").value = "";
      document.getElementById("cleanup-temp-on-success").checked = Boolean(data.cleanup_temp_on_success);
      document.getElementById("fns-token-meta").textContent = data.fns_token_configured ? `已配置：${data.fns_token_masked}` : "当前未配置";

      document.getElementById(data.image_mode === "s3_hotlink" ? "image-mode-s3" : "image-mode-wechat").checked = true;
      document.getElementById("image-storage-endpoint").value = data.image_storage_endpoint || "";
      document.getElementById("image-storage-region").value = data.image_storage_region || "";
      document.getElementById("image-storage-bucket").value = data.image_storage_bucket || "";
      document.getElementById("image-storage-access-key-id").value = data.image_storage_access_key_id || "";
      document.getElementById("image-storage-secret-access-key").value = "";
      document.getElementById("image-storage-path-template").value = data.image_storage_path_template || "";
      document.getElementById("image-storage-public-base-url").value = data.image_storage_public_base_url || "";
      document.getElementById("image-storage-secret-meta").textContent = data.image_storage_secret_access_key_configured
        ? `已配置：${data.image_storage_secret_access_key_masked}`
        : "当前未配置";

      updateOverview(data);
      clearFields.clear();
      resetChanged();
      syncImageModeUI();
      await checkFnsStatus();
    }

    async function checkFnsStatus() {
      setFnsHealth("info", "正在检测 FNS 连接...");
      const response = await fetch("/api/admin/fns-status");
      const data = await response.json();
      if (!response.ok) {
        setFnsHealth("error", data.detail || "检测失败");
        fnsStatusEl.textContent = JSON.stringify(data, null, 2);
        return;
      }
      if (!data.configured) {
        setFnsHealth("warn", data.message || "FNS 尚未配置完整。");
      } else if (data.connected && data.vault_exists) {
        setFnsHealth("success", `已连接 ${data.base_url}，vault ${data.vault_name} 可用。`);
      } else if (data.connected) {
        setFnsHealth("warn", data.message || "连接正常，但目标 vault 不存在。");
      } else {
        setFnsHealth("error", data.message || "连接失败。");
      }
      fnsStatusEl.textContent = JSON.stringify(data, null, 2);
    }

    document.getElementById("paste-fns-button").addEventListener("click", async () => {
      try {
        const rawText = await navigator.clipboard.readText();
        document.getElementById("fns-json-input").value = rawText;
        applyFnsImport(parseFnsJson(rawText));
      } catch (error) {
        setResult(
          error && error.message && error.message.includes("JSON")
            ? error.message
            : "读取剪贴板失败，请改用手动粘贴 JSON 文本。"
        );
      }
    });

    document.getElementById("parse-fns-button").addEventListener("click", () => {
      try {
        applyFnsImport(parseFnsJson(document.getElementById("fns-json-input").value.trim()));
      } catch (error) {
        setResult(String(error.message || error));
      }
    });

    document.getElementById("clear-fns-token").addEventListener("click", () => {
      clearFields.add("fns_token");
      document.getElementById("fns-token").value = "";
      document.getElementById("fns-token-meta").textContent = "本次保存会清空 FNS Token。";
      markChanged("fns-token");
      validateForm();
      setResult("已标记：保存时会清空 FNS Token。");
    });

    document.getElementById("clear-image-storage-secret").addEventListener("click", () => {
      clearFields.add("image_storage_secret_access_key");
      document.getElementById("image-storage-secret-access-key").value = "";
      document.getElementById("image-storage-secret-meta").textContent = "本次保存会清空图床密钥。";
      markChanged("image-storage-secret-access-key");
      validateForm();
      setResult("已标记：保存时会清空图床 Secret Access Key。");
    });

    document.getElementById("save-settings").addEventListener("click", async () => {
      const payload = {
        fns_base_url: document.getElementById("fns-base-url").value.trim(),
        fns_vault: document.getElementById("fns-vault").value.trim(),
        fns_target_dir: document.getElementById("fns-target-dir").value.trim(),
        cleanup_temp_on_success: document.getElementById("cleanup-temp-on-success").checked,
        image_mode: getImageMode(),
        image_storage_endpoint: document.getElementById("image-storage-endpoint").value.trim(),
        image_storage_region: document.getElementById("image-storage-region").value.trim(),
        image_storage_bucket: document.getElementById("image-storage-bucket").value.trim(),
        image_storage_access_key_id: document.getElementById("image-storage-access-key-id").value.trim(),
        image_storage_path_template: document.getElementById("image-storage-path-template").value.trim(),
        image_storage_public_base_url: document.getElementById("image-storage-public-base-url").value.trim(),
        clear_fields: Array.from(clearFields)
      };
      const fnsToken = document.getElementById("fns-token").value.trim();
      const storageSecret = document.getElementById("image-storage-secret-access-key").value.trim();
      if (fnsToken) payload.fns_token = fnsToken;
      if (storageSecret) payload.image_storage_secret_access_key = storageSecret;

      const response = await fetch("/api/admin/settings", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      setResult(response.ok ? "设置已保存并生效。" : "保存失败。", data);
      if (response.ok) {
        await loadSettings();
      }
    });

    document.getElementById("change-password-button").addEventListener("click", async () => {
      const response = await fetch("/api/admin/password", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          current_password: document.getElementById("current-password").value,
          new_password: document.getElementById("new-password").value
        })
      });
      const data = await response.json();
      setResult(response.ok ? "密码已更新。" : "密码更新失败。", data);
      if (response.ok) {
        document.getElementById("current-password").value = "";
        document.getElementById("new-password").value = "";
      }
    });

    document.getElementById("check-fns-button").addEventListener("click", () => {
      checkFnsStatus().catch((error) => setFnsHealth("error", String(error)));
    });

    ["fns-base-url", "fns-vault", "fns-target-dir", "fns-token", ...s3FieldIds].forEach((id) => {
      document.getElementById(id).addEventListener("input", () => {
        clearFields.delete(id.replace(/-/g, "_"));
        validateForm();
      });
    });

    document.querySelectorAll('input[name="image-mode"]').forEach((node) => {
      node.addEventListener("change", syncImageModeUI);
    });

    document.getElementById("logout-button").addEventListener("click", async () => {
      await fetch("/api/session", { method: "DELETE" });
      window.location.href = "/login";
    });

    loadSettings().catch((error) => {
      setResult(String(error));
    });
  </script>
</body>
</html>
