<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设置 — Wechat MD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
</head>
<body>
  <!-- Top Nav -->
  <nav class="top-nav">
    <div class="logo">Wechat <span>MD</span></div>
    <a class="nav-item" href="/">转换</a>
    <a class="nav-item active" href="/settings">设置</a>
    <button id="logout-btn" class="nav-item logout">退出</button>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>设置中心</h1>
      <p>维护 FNS 同步目标、图片策略和账号安全。保存后立即生效。</p>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav" data-tab-group="settings">
      <button class="tab-btn active" data-tab="fns">FNS 同步</button>
      <button class="tab-btn" data-tab="image">图片模式</button>
      <button class="tab-btn" data-tab="behavior">运行行为</button>
      <button class="tab-btn" data-tab="security">账号安全</button>
    </div>

    <!-- Tab: FNS -->
    <div class="tab-panel active" data-tab-panel="settings" data-tab-id="fns">
      <div class="card">
        <h2 class="card-title">FNS 配置</h2>
        <p class="card-desc">填写 Fast Note Sync 服务信息。导入只填表，需要手动保存。</p>

        <div class="field">
          <label for="fns-json-input">粘贴 FNS JSON</label>
          <textarea id="fns-json-input" placeholder='{"api":"https://...","apiToken":"...","vault":"obsidian"}' style="min-height:70px;"></textarea>
        </div>
        <div class="action-row" style="margin-top:8px;">
          <button id="paste-fns-btn" class="btn btn-secondary">从剪贴板导入</button>
          <button id="parse-fns-btn" class="btn btn-ghost">解析并填充</button>
        </div>

        <div class="sep"></div>

        <div class="field-row">
          <div class="field">
            <label for="fns-base-url">FNS 基础地址</label>
            <input id="fns-base-url" placeholder="https://obsync.example.com">
            <div class="field-hint" id="hint-fns-base-url"></div>
          </div>
          <div class="field">
            <label for="fns-vault">Vault</label>
            <input id="fns-vault" placeholder="obsidian">
            <div class="field-hint" id="hint-fns-vault"></div>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="fns-target-dir">目标目录</label>
            <input id="fns-target-dir" placeholder="00_Inbox/微信公众号">
            <div class="field-hint" id="hint-fns-target-dir"></div>
          </div>
          <div class="field">
            <label for="fns-token">FNS Token</label>
            <input id="fns-token" type="password" placeholder="留空则保持不变">
            <div class="field-hint text-muted" id="fns-token-meta"></div>
          </div>
        </div>
        <div class="action-row">
          <button id="clear-fns-token" class="btn btn-danger">清空 Token</button>
          <button id="check-fns-btn" class="btn btn-secondary">检测 FNS 连接</button>
        </div>
        <div id="fns-result-area"></div>
      </div>
    </div>

    <!-- Tab: Image -->
    <div class="tab-panel" data-tab-panel="settings" data-tab-id="image">
      <div class="card">
        <h2 class="card-title">图片外链设置</h2>
        <p class="card-desc">选择文章中图片的处理模式。</p>

        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="image-mode" id="image-mode-wechat" value="wechat_hotlink">
            <div>
              <strong>微信原链</strong>
              <div class="desc">不上传图片，Markdown 保留微信图片链接。</div>
            </div>
          </label>
          <label class="radio-option">
            <input type="radio" name="image-mode" id="image-mode-s3" value="s3_hotlink">
            <div>
              <strong>S3 图床外链</strong>
              <div class="desc">静态图上传到 S3 图床，GIF/SVG 保留微信原链。</div>
            </div>
          </label>
        </div>

        <div id="s3-panel" class="hidden" style="margin-top:16px;">
          <div class="sep"></div>
          <div class="field-row">
            <div class="field">
              <label for="s3-endpoint">S3 Endpoint</label>
              <input id="s3-endpoint" placeholder="https://s3.example.com">
              <div class="field-hint" id="hint-s3-endpoint"></div>
            </div>
            <div class="field">
              <label for="s3-region">Region</label>
              <input id="s3-region" placeholder="auto">
              <div class="field-hint" id="hint-s3-region"></div>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="s3-bucket">Bucket</label>
              <input id="s3-bucket" placeholder="wechat-images">
              <div class="field-hint" id="hint-s3-bucket"></div>
            </div>
            <div class="field">
              <label for="s3-access-key">Access Key ID</label>
              <input id="s3-access-key" placeholder="AKIA...">
              <div class="field-hint" id="hint-s3-access-key"></div>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="s3-secret-key">Secret Access Key</label>
              <input id="s3-secret-key" type="password" placeholder="留空则保持不变">
              <div class="field-hint text-muted" id="s3-secret-meta"></div>
            </div>
            <div class="field">
              <label for="s3-path-tpl">路径模板</label>
              <input id="s3-path-tpl" placeholder="wechat/{year}/{filename}">
              <div class="field-hint" id="hint-s3-path-tpl"></div>
            </div>
          </div>
          <div class="field">
            <label for="s3-public-url">公开访问域名</label>
            <input id="s3-public-url" placeholder="https://img.example.com">
            <div class="field-hint" id="hint-s3-public-url"></div>
          </div>
          <div class="action-row">
            <button id="clear-s3-secret" class="btn btn-danger">清空图床密钥</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab: Behavior -->
    <div class="tab-panel" data-tab-panel="settings" data-tab-id="behavior">
      <div class="card">
        <h2 class="card-title">运行行为</h2>
        <p class="card-desc">控制转换成功后的清理策略。</p>
        <label class="check-row">
          <input id="cleanup-on-success" type="checkbox">
          转换成功后自动清理临时目录
        </label>
        <p class="text-sm text-muted" style="margin-top:6px;">关闭后会在服务端保留成功任务产物。失败任务始终会清理。</p>
      </div>
    </div>

    <!-- Tab: Security -->
    <div class="tab-panel" data-tab-panel="settings" data-tab-id="security">
      <div class="card">
        <h2 class="card-title">修改密码</h2>
        <p class="card-desc">当前登录用户：<strong id="current-user">-</strong></p>
        <div class="field-row">
          <div class="field">
            <label for="current-password">当前密码</label>
            <input id="current-password" type="password" autocomplete="current-password">
          </div>
          <div class="field">
            <label for="new-password">新密码</label>
            <input id="new-password" type="password" autocomplete="new-password">
          </div>
        </div>
        <div class="action-row">
          <button id="change-pw-btn" class="btn btn-secondary">修改密码</button>
        </div>
        <div id="pw-result-area"></div>
      </div>
    </div>

    <!-- Save Button (sticky at bottom of all tabs) -->
    <div class="action-row" style="margin-top:8px;">
      <button id="save-settings" class="btn btn-primary">保存并生效</button>
    </div>
    <div id="save-result-area"></div>
  </div>

  <script src="/assets/admin.js"></script>
  <script>
    AdminUI.initTabs();
    const clearFields = new Set();

    /* ── Helpers ── */
    function getImageMode() {
      return document.querySelector('input[name="image-mode"]:checked')?.value || "wechat_hotlink";
    }

    function syncS3Panel() {
      document.getElementById("s3-panel").classList.toggle("hidden", getImageMode() !== "s3_hotlink");
    }

    document.querySelectorAll('input[name="image-mode"]').forEach((el) =>
      el.addEventListener("change", syncS3Panel)
    );

    /* ── Validators ── */
    const validators = {
      "fns-base-url": (v) => !v || /^https?:\/\//i.test(v)
        ? { ok: true, text: v ? "格式正确" : "" }
        : { ok: false, text: "必须以 http:// 或 https:// 开头" },
      "fns-vault": (v) => !document.getElementById("fns-base-url").value.trim() || v
        ? { ok: true, text: "" }
        : { ok: false, text: "启用 FNS 时请填写 Vault" },
      "fns-target-dir": (v) => v
        ? { ok: true, text: "" }
        : { ok: false, text: "请输入目标目录" },
      "fns-token": (v) => !document.getElementById("fns-base-url").value.trim() || v || document.getElementById("fns-token-meta").textContent.includes("已配置")
        ? { ok: true, text: "" }
        : { ok: false, text: "启用 FNS 时需要 Token" },
      "s3-endpoint": (v) => getImageMode() !== "s3_hotlink" || /^https?:\/\//i.test(v)
        ? { ok: true, text: "" }
        : { ok: false, text: "必须以 http:// 或 https:// 开头" },
      "s3-region": (v) => getImageMode() !== "s3_hotlink" || v
        ? { ok: true, text: "" }
        : { ok: false, text: "请填写 Region" },
      "s3-bucket": (v) => getImageMode() !== "s3_hotlink" || v
        ? { ok: true, text: "" }
        : { ok: false, text: "请填写 Bucket" },
      "s3-access-key": (v) => getImageMode() !== "s3_hotlink" || v
        ? { ok: true, text: "" }
        : { ok: false, text: "请填写 Access Key ID" },
      "s3-secret-key": (v) => getImageMode() !== "s3_hotlink" || v || document.getElementById("s3-secret-meta").textContent.includes("已配置")
        ? { ok: true, text: "" }
        : { ok: false, text: "请填写 Secret Access Key" },
      "s3-path-tpl": (v) => getImageMode() !== "s3_hotlink" || v
        ? { ok: true, text: "" }
        : { ok: false, text: "请填写路径模板" },
      "s3-public-url": (v) => getImageMode() !== "s3_hotlink" || /^https?:\/\//i.test(v)
        ? { ok: true, text: "" }
        : { ok: false, text: "必须以 http:// 或 https:// 开头" },
    };

    function validateField(id) {
      const val = document.getElementById(id)?.value?.trim() || "";
      const result = validators[id]?.(val);
      if (!result) return true;
      const hintEl = document.getElementById(`hint-${id}`);
      if (hintEl) {
        hintEl.textContent = result.text;
        hintEl.className = `field-hint ${result.ok ? "success" : "error"}`;
      }
      const input = document.getElementById(id);
      if (input) input.classList.toggle("field-error", !result.ok);
      return result.ok;
    }

    function validateAll() {
      const ids = Object.keys(validators);
      const ok = ids.every(validateField);
      document.getElementById("save-settings").disabled = !ok;
      return ok;
    }

    Object.keys(validators).forEach((id) => {
      document.getElementById(id)?.addEventListener("input", validateAll);
    });

    /* ── FNS Import ── */
    function parseFnsJson(raw) {
      let parsed;
      try { parsed = JSON.parse(raw); } catch { throw new Error("不是有效的 JSON"); }
      const missing = ["api", "apiToken", "vault"].filter((k) => !String(parsed[k] || "").trim());
      if (missing.length) throw new Error(`缺少字段: ${missing.join(", ")}`);
      const api = String(parsed.api).trim();
      if (!/^https?:\/\//i.test(api)) throw new Error("FNS 地址格式无效");
      return { fns_base_url: api.replace(/\/+$/, ""), fns_token: String(parsed.apiToken).trim(), fns_vault: String(parsed.vault).trim() };
    }

    function applyFnsImport(p) {
      document.getElementById("fns-base-url").value = p.fns_base_url;
      document.getElementById("fns-vault").value = p.fns_vault;
      document.getElementById("fns-token").value = p.fns_token;
      clearFields.delete("fns_token");
      document.getElementById("fns-token-meta").textContent = "已导入新 Token，保存后生效";
      validateAll();
      AdminUI.toast("FNS 配置已填充，请确认后保存", "success");
    }

    document.getElementById("paste-fns-btn").addEventListener("click", async () => {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById("fns-json-input").value = text;
        applyFnsImport(parseFnsJson(text));
      } catch (err) {
        AdminUI.toast(err?.message?.includes("JSON") ? err.message : "剪贴板读取失败，请手动粘贴", "error");
      }
    });

    document.getElementById("parse-fns-btn").addEventListener("click", () => {
      try {
        applyFnsImport(parseFnsJson(document.getElementById("fns-json-input").value.trim()));
      } catch (err) { AdminUI.toast(String(err.message || err), "error"); }
    });

    document.getElementById("clear-fns-token").addEventListener("click", () => {
      clearFields.add("fns_token");
      document.getElementById("fns-token").value = "";
      document.getElementById("fns-token-meta").textContent = "保存时将清空 Token";
      validateAll();
      AdminUI.toast("已标记清空 Token，保存后生效", "warn");
    });

    document.getElementById("clear-s3-secret").addEventListener("click", () => {
      clearFields.add("image_storage_secret_access_key");
      document.getElementById("s3-secret-key").value = "";
      document.getElementById("s3-secret-meta").textContent = "保存时将清空密钥";
      validateAll();
      AdminUI.toast("已标记清空图床密钥", "warn");
    });

    /* ── Check FNS ── */
    document.getElementById("check-fns-btn").addEventListener("click", async () => {
      const btn = document.getElementById("check-fns-btn");
      btn.disabled = true;
      btn.textContent = "检测中…";
      try {
        const res = await fetch("/api/admin/fns-status");
        const data = await res.json();
        if (data.connected && data.vault_exists) {
          AdminUI.toast("FNS 连接正常", "success");
          AdminUI.setHtml("fns-result-area", AdminUI.resultHtml({
            title: "连接正常", tone: "success",
            description: data.message,
            items: [{ label: "服务地址", value: data.base_url }, { label: "Vault", value: data.vault_name }],
            json: data,
          }));
        } else {
          AdminUI.toast(data.message || "连接异常", data.connected ? "warn" : "error");
          AdminUI.setHtml("fns-result-area", AdminUI.resultHtml({
            title: data.connected ? "目标异常" : "连接失败",
            tone: data.connected ? "warn" : "error",
            description: data.message,
            json: data,
          }));
        }
      } catch (err) { AdminUI.toast("检测失败", "error"); }
      finally { btn.disabled = false; btn.textContent = "检测 FNS 连接"; }
    });

    /* ── Save Settings ── */
    document.getElementById("save-settings").addEventListener("click", async () => {
      if (!validateAll()) return;
      const btn = document.getElementById("save-settings");
      btn.disabled = true;
      btn.textContent = "保存中…";

      const payload = {
        fns_base_url: document.getElementById("fns-base-url").value.trim(),
        fns_vault: document.getElementById("fns-vault").value.trim(),
        fns_target_dir: document.getElementById("fns-target-dir").value.trim(),
        cleanup_temp_on_success: document.getElementById("cleanup-on-success").checked,
        image_mode: getImageMode(),
        image_storage_endpoint: document.getElementById("s3-endpoint").value.trim(),
        image_storage_region: document.getElementById("s3-region").value.trim(),
        image_storage_bucket: document.getElementById("s3-bucket").value.trim(),
        image_storage_access_key_id: document.getElementById("s3-access-key").value.trim(),
        image_storage_path_template: document.getElementById("s3-path-tpl").value.trim(),
        image_storage_public_base_url: document.getElementById("s3-public-url").value.trim(),
        clear_fields: Array.from(clearFields),
      };
      const fnsToken = document.getElementById("fns-token").value.trim();
      const s3Secret = document.getElementById("s3-secret-key").value.trim();
      if (fnsToken) payload.fns_token = fnsToken;
      if (s3Secret) payload.image_storage_secret_access_key = s3Secret;

      try {
        const res = await fetch("/api/admin/settings", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (res.ok) {
          AdminUI.toast("设置已保存", "success");
          AdminUI.setHtml("save-result-area", AdminUI.resultHtml({
            title: "保存成功", tone: "success",
            items: [
              { label: "FNS Vault", value: data.settings?.fns_vault || "-" },
              { label: "图片模式", value: data.settings?.image_mode === "s3_hotlink" ? "S3 图床外链" : "微信原链" },
            ],
            json: data,
          }));
          await loadSettings();
        } else {
          AdminUI.toast("保存失败", "error");
          AdminUI.setHtml("save-result-area", AdminUI.resultHtml({
            title: "保存失败", tone: "error",
            description: data.detail || "请检查表单内容",
            json: data,
          }));
        }
      } catch (err) { AdminUI.toast("网络错误", "error"); }
      finally { btn.disabled = false; btn.textContent = "保存并生效"; }
    });

    /* ── Change Password ── */
    document.getElementById("change-pw-btn").addEventListener("click", async () => {
      const btn = document.getElementById("change-pw-btn");
      btn.disabled = true;
      try {
        const res = await fetch("/api/admin/password", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            current_password: document.getElementById("current-password").value,
            new_password: document.getElementById("new-password").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          AdminUI.toast("密码已更新", "success");
          document.getElementById("current-password").value = "";
          document.getElementById("new-password").value = "";
          AdminUI.setHtml("pw-result-area", AdminUI.resultHtml({ title: "密码修改成功", tone: "success", json: data }));
        } else {
          AdminUI.toast("修改失败", "error");
          AdminUI.setHtml("pw-result-area", AdminUI.resultHtml({ title: "修改失败", tone: "error", description: data.detail, json: data }));
        }
      } catch (err) { AdminUI.toast("网络错误", "error"); }
      finally { btn.disabled = false; }
    });

    /* ── Load Settings ── */
    async function loadSettings() {
      try {
        const res = await fetch("/api/admin/settings");
        const data = await res.json();
        document.getElementById("fns-base-url").value = data.fns_base_url || "";
        document.getElementById("fns-vault").value = data.fns_vault || "";
        document.getElementById("fns-target-dir").value = data.fns_target_dir || "";
        document.getElementById("fns-token").value = "";
        document.getElementById("fns-token-meta").textContent = data.fns_token_configured ? `已配置：${data.fns_token_masked}` : "未配置";
        document.getElementById("cleanup-on-success").checked = Boolean(data.cleanup_temp_on_success);

        document.getElementById(data.image_mode === "s3_hotlink" ? "image-mode-s3" : "image-mode-wechat").checked = true;
        document.getElementById("s3-endpoint").value = data.image_storage_endpoint || "";
        document.getElementById("s3-region").value = data.image_storage_region || "";
        document.getElementById("s3-bucket").value = data.image_storage_bucket || "";
        document.getElementById("s3-access-key").value = data.image_storage_access_key_id || "";
        document.getElementById("s3-secret-key").value = "";
        document.getElementById("s3-path-tpl").value = data.image_storage_path_template || "";
        document.getElementById("s3-public-url").value = data.image_storage_public_base_url || "";
        document.getElementById("s3-secret-meta").textContent = data.image_storage_secret_access_key_configured
          ? `已配置：${data.image_storage_secret_access_key_masked}` : "未配置";

        AdminUI.setText("current-user", data.current_user?.username || "-");
        clearFields.clear();
        syncS3Panel();
        validateAll();
      } catch (err) {
        AdminUI.toast("设置读取失败", "error");
      }
    }

    /* ── Logout ── */
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await fetch("/api/session", { method: "DELETE" });
      window.location.href = "/login";
    });

    /* ── Init ── */
    loadSettings();
  </script>
</body>
</html>
